version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=astrikos-coal-mining-secret-key-2024
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://${HOST_IP}:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://${HOST_IP}:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
